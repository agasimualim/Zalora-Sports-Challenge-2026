<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GTR Fest 17</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="js/config.js"></script>
<script src="js/scoring.js"></script>
<script src="js/api.js"></script>
<style>
:root{--bg:#111116;--surface:#17171e;--card:#1c1c25;--card2:#21212c;--border:#2a2a38;--border2:#333345;--text:#f0f0f5;--muted:#888899;--dim:#555566;--orange:#FC5200;--orange2:#ff6a1a;--gold:#f5a623;--silver:#b0b0c0;--bronze:#c87c3e;--red:#e24b4a;--green:#2ecc71;--r:8px;--rlg:12px;--sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;min-height:100vh;}
a{color:inherit;text-decoration:none;}
.wrap{max-width:1100px;margin:0 auto;padding:0 20px 60px;}
header{padding:28px 0 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
.ht{font-size:24px;font-weight:600;}
.hs{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:3px;}
.ha{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn{padding:8px 16px;border-radius:var(--r);border:none;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-p{background:var(--orange);color:#fff;}.btn-p:hover{background:var(--orange2);}.btn-p:disabled{opacity:.5;cursor:not-allowed;}
.btn-g{background:transparent;color:var(--muted);border:0.5px solid var(--border2);}.btn-g:hover{color:var(--text);border-color:var(--muted);}
.btn-r{background:transparent;color:var(--red);border:0.5px solid rgba(226,75,74,.4);}.btn-r:hover{background:rgba(226,75,74,.1);}
.apill{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);padding:6px 12px;font-size:13px;display:flex;align-items:center;gap:8px;}
.dbar{display:flex;align-items:center;gap:10px;padding:14px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.dbar label{font-size:10px;color:var(--dim);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;}
.di{background:var(--card);border:0.5px solid var(--border2);border-radius:var(--r);padding:6px 10px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;transition:border-color .15s;cursor:pointer;}
.di:focus{border-color:var(--orange);}.di::-webkit-calendar-picker-indicator{filter:invert(.4);}
.dsep{color:var(--dim);font-size:12px;}.dlbl{font-size:11px;color:var(--dim);font-family:var(--mono);}
.tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;margin-bottom:24px;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:11px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--sans);margin-bottom:-1px;}
.tab:hover{color:var(--text);}.tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.panel{display:none;}.panel.active{display:block;animation:fu .2s ease;}
@keyframes fu{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.sstrip{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.sc{background:var(--card);border:0.5px solid var(--border);border-top:2px solid var(--orange);border-radius:var(--r);padding:14px 16px;}
.sl{font-size:10px;color:var(--dim);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.sv{font-size:22px;font-weight:600;color:var(--orange);}.su{font-size:11px;color:var(--dim);font-family:var(--mono);margin-top:2px;}
.lw{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rlg);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--card2);}
thead th{padding:10px 14px;font-size:10px;font-weight:500;color:var(--dim);text-align:left;font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
thead th.r{text-align:right;}
.lr{border-top:0.5px solid var(--border);transition:background .1s;}.lr:hover{background:rgba(252,82,0,.04);}
.lr td{padding:12px 14px;vertical-align:middle;}.lr td.r{text-align:right;}
.rk{width:26px;height:26px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}
.rk1{background:var(--orange);color:#fff;}.rk2{background:#2a2a35;color:var(--silver);}.rk3{background:#2a2a35;color:var(--bronze);}.rkn{background:#1e1e28;color:var(--dim);font-family:var(--mono);}
.mrow{display:flex;align-items:center;gap:10px;}
.av{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;background:var(--card2);color:var(--muted);border:0.5px solid var(--border2);width:34px;height:34px;border-radius:50%;flex-shrink:0;}
.mn{font-weight:500;font-size:14px;}.mm{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:1px;}
.td{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle;}
.stk{display:inline-flex;align-items:center;background:rgba(252,82,0,.15);color:var(--orange);border-radius:4px;padding:1px 7px;font-size:10px;font-family:var(--mono);margin-left:6px;}
.pc{font-size:17px;font-weight:600;color:var(--orange);}.mc{font-family:var(--mono);font-size:12px;color:var(--muted);}
.pgr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:0.5px solid var(--border);background:var(--card2);}
.pi{font-size:12px;color:var(--dim);font-family:var(--mono);}.pb{display:flex;gap:5px;}
.pbn{background:var(--card);border:0.5px solid var(--border2);border-radius:6px;padding:5px 11px;font-size:12px;color:var(--muted);font-family:var(--mono);cursor:pointer;transition:all .15s;}
.pbn:hover{color:var(--text);}.pbn.on{background:var(--orange);color:#fff;border-color:var(--orange);}.pbn:disabled{opacity:.3;cursor:not-allowed;}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.tc{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rlg);padding:20px;position:relative;overflow:hidden;transition:border-color .15s;}
.tc:hover{border-color:var(--border2);}.tc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--tc,var(--orange));}
.tcr{position:absolute;top:14px;right:14px;font-size:40px;font-weight:600;color:rgba(255,255,255,.03);pointer-events:none;}
.tcn{font-size:18px;font-weight:600;color:var(--tc,var(--orange));margin-bottom:2px;}.tcc{font-size:11px;color:var(--dim);font-family:var(--mono);margin-bottom:16px;}
.tcs{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tsl{font-size:10px;color:var(--dim);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;}
.tsv{font-size:17px;font-weight:500;color:var(--text);margin-top:2px;}.tsv.big{font-size:22px;color:var(--tc,var(--orange));}
.mtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.mt{padding:5px 14px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--muted);font-size:12px;font-family:var(--mono);cursor:pointer;transition:all .15s;}
.mt.active{background:var(--orange);color:#fff;border-color:var(--orange);font-weight:500;}.mt:hover:not(.active){border-color:var(--muted);color:var(--text);}
.af{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.asrch{background:var(--card);border:0.5px solid var(--border2);border-radius:var(--r);padding:8px 13px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .15s;min-width:180px;flex:1;}
.asrch:focus{border-color:var(--orange);}.asrch::placeholder{color:var(--dim);}
.tfb{padding:5px 13px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--muted);font-size:12px;font-family:var(--mono);cursor:pointer;transition:all .15s;white-space:nowrap;}
.tfb:hover{color:var(--text);}.tfb.active{background:var(--orange);color:#fff;border-color:var(--orange);}
.achips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
.achip{display:flex;align-items:center;gap:7px;padding:5px 12px 5px 8px;border-radius:20px;border:0.5px solid var(--border2);background:var(--card);cursor:pointer;transition:all .15s;font-size:12px;}
.achip:hover{border-color:var(--muted);}
.achip.sel{background:rgba(252,82,0,.12);border-color:var(--orange);color:var(--orange);}
.alist{display:flex;flex-direction:column;gap:8px;}
.acard{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:flex-start;gap:12px;transition:border-color .15s;}
.acard:hover{border-color:var(--border2);}
.aico{width:38px;height:38px;border-radius:var(--r);background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:0.5px solid var(--border);}
.abody{flex:1;min-width:0;}
.awho{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.awn{font-size:11px;color:var(--muted);font-family:var(--mono);}.awtag{font-size:10px;padding:1px 6px;border-radius:3px;margin-left:6px;font-family:var(--mono);}
.awtag.ocr{background:rgba(46,204,113,.15);color:var(--green);}.awtag.manual{background:rgba(252,82,0,.15);color:var(--orange);}
.aname{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.adate{font-size:11px;color:var(--dim);font-family:var(--mono);margin-top:2px;}
.astats{display:flex;gap:14px;margin-top:6px;flex-wrap:wrap;}
.astat{font-size:11px;font-family:var(--mono);color:var(--muted);}.astat b{color:var(--text);font-weight:500;}
.abns{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.abn{background:rgba(252,82,0,.1);color:var(--orange);border-radius:4px;padding:2px 7px;font-size:10px;font-family:var(--mono);}
.apts{text-align:right;flex-shrink:0;}.apv{font-size:20px;font-weight:600;color:var(--orange);}.apl{font-size:10px;color:var(--dim);font-family:var(--mono);}
.ainv{opacity:.4;}.ainv .apv{color:var(--dim);}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;}
.sr{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:flex-start;gap:12px;}
.si{font-size:20px;flex-shrink:0;margin-top:1px;}.stt{font-weight:500;font-size:13px;margin-bottom:3px;}.sd{font-size:11px;color:var(--muted);line-height:1.5;}
.spts{margin-left:auto;padding-left:10px;flex-shrink:0;font-size:15px;font-weight:600;color:var(--orange);font-family:var(--mono);}
.sec-title{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);font-family:var(--mono);margin:28px 0 10px;}
.sec-note{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:14px;}
.aclamp{font-size:11px;font-family:var(--mono);color:var(--gold);}
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:13px;}
.spin{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:sp .6s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:0.5px solid var(--border2);border-radius:var(--r);padding:12px 18px;font-size:13px;max-width:300px;transform:translateY(80px);opacity:0;transition:all .25s;z-index:999;}
#toast.show{transform:none;opacity:1;}#toast.success{border-color:var(--orange);color:var(--orange);}#toast.error{border-color:#e24b4a;color:#e24b4a;}
footer{text-align:center;padding:24px 20px 36px;border-top:1px solid var(--border);margin-top:40px;}

/* --- Modal --- */
.moverlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;}
.moverlay.show{display:flex;}
.modal{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rlg);padding:32px;max-width:420px;width:90%;}
.modal h3{font-size:18px;font-weight:600;margin-bottom:4px;}
.modal .ms{font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:20px;}
.modal input{width:100%;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r);padding:10px 14px;color:var(--text);font-size:14px;font-family:var(--sans);outline:none;margin-bottom:12px;transition:border-color .15s;}
.modal input:focus{border-color:var(--orange);}
.modal .mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.modal .merr{font-size:12px;color:var(--red);font-family:var(--mono);margin-bottom:8px;min-height:18px;}

/* --- Submit Panel --- */
.upload-zone{border:2px dashed var(--border2);border-radius:var(--rlg);padding:48px 20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:16px;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--orange);background:rgba(252,82,0,.04);}
.upload-zone .uz-icon{font-size:40px;margin-bottom:12px;}
.upload-zone .uz-text{font-size:14px;color:var(--muted);}
.upload-zone .uz-hint{font-size:11px;color:var(--dim);font-family:var(--mono);margin-top:4px;}
.upload-zone.has-image{border-style:solid;border-color:var(--border);padding:16px;}
.upload-zone.has-image img{max-width:100%;max-height:500px;border-radius:var(--r);object-fit:contain;cursor:zoom-in;}
.upload-zone input[type=file]{display:none;}
.review-form{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rlg);padding:20px;}
.review-form h4{font-size:14px;font-weight:600;margin-bottom:16px;}
.frow{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.fcol{flex:1;min-width:140px;}
.fcol label{display:block;font-size:10px;color:var(--dim);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.fcol input,.fcol select{width:100%;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r);padding:8px 12px;color:var(--text);font-size:13px;font-family:var(--sans);outline:none;transition:border-color .15s;}
.fcol input:focus,.fcol select:focus{border-color:var(--orange);}
.fcol select{appearance:auto;}
.fcol input.edited{border-color:var(--orange);}
.rft{margin-top:16px;display:flex;align-items:center;gap:12px;justify-content:space-between;flex-wrap:wrap;}
.help-link{font-size:12px;color:var(--dim);font-family:var(--mono);cursor:pointer;transition:color .15s;}
.help-link:hover{color:var(--red);}
@media(max-width:600px){.hm{display:none;}.frow{flex-direction:column;}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div><div class="ht">GTR Fest 17</div><div class="hs" id="countdown"></div></div>
  <div class="ha" id="ha"><div class="spin"></div></div>
</header>
<div class="dbar">
  <label>Period</label>
  <input type="date" class="di" id="rs" value="2026-04-01" min="2026-04-01"/>
  <span class="dsep">→</span>
  <input type="date" class="di" id="re" value="2026-04-30"/>
  <button class="btn btn-g" id="apply-btn" style="padding:6px 14px;font-size:12px;">Apply</button>
  <span class="dlbl" id="dlbl"></span>
</div>
<div class="tabs">
  <button class="tab active" data-tab="overall">Overall</button>
  <button class="tab" data-tab="teams">Teams</button>
  <button class="tab" data-tab="individual">Individual</button>
  <button class="tab" data-tab="activities">Activities</button>
  <button class="tab" data-tab="myactivities">My Activities</button>
  <button class="tab" data-tab="submit">Submit</button>
  <button class="tab" data-tab="scoring">Scoring Guide</button>
</div>
<div class="panel active" id="panel-overall">
  <div class="sstrip" id="ostats"></div>
  <div id="olb"></div>
</div>
<div class="panel" id="panel-teams">
  <div class="tgrid" id="tgrid"></div>
</div>
<div class="panel" id="panel-individual">
  <div class="mtabs">
    <button class="mt active" data-metric="points">Points</button>
    <button class="mt" data-metric="calories">Calories</button>
    <button class="mt" data-metric="distance">Distance</button>
    <button class="mt" data-metric="duration">Duration</button>
    <button class="mt" data-metric="activities">Activities</button>
  </div>
  <div class="mtabs" id="distCats" style="display:none;"></div>
  <div id="ilb"></div>
</div>
<div class="panel" id="panel-activities">
  <div class="af">
    <input type="text" class="asrch" id="asrch" placeholder="Search athlete..."/>
    <div style="display:flex;gap:6px;flex-wrap:wrap;" id="tfbtns">
      <button class="tfb active" data-team="all" id="tf-all">All</button>
    </div>
    <div style="display:flex;gap:6px;align-items:center;">
      <input type="date" class="di" id="af-from" title="From date"/>
      <span style="color:var(--dim);font-size:11px;">–</span>
      <input type="date" class="di" id="af-to" title="To date"/>
      <button class="tfb" id="af-clear" style="display:none;">✕</button>
    </div>
  </div>
  <div class="achips" id="achips"></div>
  <div id="acontent"></div>
</div>
<div class="panel" id="panel-myactivities">
  <div class="af">
    <input type="date" class="di" id="maf-from" title="From date"/>
    <span style="color:var(--dim);font-size:11px;">–</span>
    <input type="date" class="di" id="maf-to" title="To date"/>
    <button class="tfb" id="maf-clear" style="display:none;">✕</button>
  </div>
  <div id="mastats"></div>
  <div id="macontent"></div>
</div>
<div class="panel" id="panel-submit">
  <div id="submit-content"></div>
</div>
<div class="panel" id="panel-scoring">
  <div class="sgrid" id="sgrid"></div>
  <div class="sec-title">Calorie Plausibility Ceiling</div>
  <div class="sec-note" id="cnote"></div>
  <div class="sgrid" id="cgrid"></div>
</div>
</div>

<!-- Register Modal -->
<div class="moverlay" id="register-modal">
  <div class="modal">
    <h3>Register</h3>
    <div class="ms">Enter your invite code and name to join the challenge.</div>
    <input type="text" id="reg-code" placeholder="Invite code (e.g. Z1-ALPHA)" autocomplete="off"/>
    <input type="text" id="reg-name" placeholder="Your name" autocomplete="off"/>
    <div class="merr" id="reg-err"></div>
    <div class="mbtns">
      <button class="btn btn-g" id="reg-cancel">Cancel</button>
      <button class="btn btn-p" id="reg-submit">Register</button>
    </div>
  </div>
</div>

<!-- Login Modal -->
<div class="moverlay" id="login-modal">
  <div class="modal">
    <h3>Login</h3>
    <div class="ms">Already registered? Enter your name and team.</div>
    <input type="text" id="login-name" placeholder="Your name" autocomplete="off"/>
    <select id="login-team" style="width:100%;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r);padding:10px 14px;color:var(--text);font-size:14px;font-family:var(--sans);outline:none;margin-bottom:12px;cursor:pointer;appearance:auto;">
    </select>
    <div class="merr" id="login-err"></div>
    <div class="mbtns">
      <button class="btn btn-g" id="login-cancel">Cancel</button>
      <button class="btn btn-p" id="login-submit">Login</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<footer>
  <p style="font-size:12px;color:var(--muted);">Powered by Gemini AI</p>
  <p style="margin-top:4px;font-size:11px;color:var(--dim);font-family:var(--mono);">GTR Fest 17 — Community Fitness Challenge</p>
  <p style="margin-top:8px;font-size:11px;font-family:var(--mono);">
    <a href="support.html" style="color:var(--orange);text-decoration:none;">Support & FAQ</a>
  </p>
</footer>

<script>
let LB=[],TEAMS=[],AACTS=[];
let aMet='points',aDistCat='all';
window.aS=CONFIG.CHALLENGE_START||'2026-04-01';
window.aE=CONFIG.CHALLENGE_END||'2026-04-30';
let aS=window.aS,aE=window.aE;
let aTm='all',aSrch='',selA=null;
let afFrom='',afTo='',mafFrom='',mafTo='';
const actDay = a => new Date(a.start_date).toLocaleDateString('en-CA', { timeZone: TIMEZONE });
const inDR = (a, f, t) => { const d = actDay(a); return (!f || d >= f) && (!t || d <= t); };
let PG={overall:1,individual:1,acts:1};
const PS=15;

function cdown() {
  const el = document.getElementById('countdown'); if (!el) return;
  const now = new Date(), s = new Date(aS), e = new Date(aE + 'T23:59:59');
  if (now < s) { const d = Math.floor((s - now) / 86400000), h = Math.floor((s - now) % 86400000 / 3600000); el.textContent = `Starts in ${d}d ${h}h`; }
  else if (now > e) { el.textContent = 'Challenge ended'; }
  else { const df = e - now, d = Math.floor(df / 86400000), h = Math.floor(df % 86400000 / 3600000), m = Math.floor(df % 3600000 / 60000); el.textContent = `${d}d ${h}h ${m}m remaining`; }
}

function openRegister() {
  document.getElementById('reg-code').value = '';
  document.getElementById('reg-name').value = '';
  document.getElementById('reg-err').textContent = '';
  document.getElementById('register-modal').classList.add('show');

async function handleRegister() {
  const code = document.getElementById('reg-code').value.trim();
  const name = document.getElementById('reg-name').value.trim();
  const errEl = document.getElementById('reg-err');
  errEl.textContent = '';
  if (!code) { errEl.textContent = 'Enter your invite code.'; return; }
  if (!name) { errEl.textContent = 'Enter your name.'; return; }
  const btn = document.getElementById('reg-submit');
  btn.disabled = true; btn.textContent = 'Registering...';
  try {
    await Auth.register(code, name);
    document.getElementById('register-modal').classList.remove('show');
    rHA(); toast('Registered! Welcome, ' + name + '.', 'success');
  } catch (e) {
    errEl.textContent = e.message;
  } finally { btn.disabled = false; btn.textContent = 'Register'; }
}

function rDistCats() {
  const cats = (CONFIG.SCORING && CONFIG.SCORING.DISTANCE_CATEGORIES) || [];

  if (!el) return;

function rInd() {
  let s = [...LB];
  if (aMet === 'distance' && aDistCat !== 'all') {
    const catCfg = (CONFIG.SCORING.DISTANCE_CATEGORIES || []).find(c => c.key === aDistCat);
    if (catCfg && catCfg.sports) {
      const catSports = catCfg.sports;
      s = s.map(m => {
        const catDist = (m.activities || [])
          .filter(a => catSports.includes(a.sport_type) && a.breakdown?.valid)
          .reduce((sum, a) => sum + ((a.distance || 0) / 1000), 0);
        return { ...m, _fullDistKm: m.totalDistanceKm, totalDistanceKm: catDist };
      });
    }
  }
  if (aMet === 'calories') s.sort((a, b) => b.totalCalories - a.totalCalories);
  if (aMet === 'distance') s.sort((a, b) => b.totalDistanceKm - a.totalDistanceKm);
  if (aMet === 'duration') s.sort((a, b) => b.totalDurationMin - a.totalDurationMin);
  if (aMet === 'activities') s.sort((a, b) => b.activityCount - a.activityCount);
  document.getElementById('ilb').innerHTML = bTable(s, aMet, 'individual');
}

function bTable(members, metric, pgKey) {
  if (!members.length) return `<div class="empty">No data yet.</div>`;
  const tb = {}; CONFIG.TEAMS.forEach(t => tb[t.id] = t);
  const p = PG[pgKey] || 1, tot = members.length, pages = Math.ceil(tot / PS);
  const sl = members.slice((p - 1) * PS, p * PS);
  const ML = { points: 'Points', calories: 'Calories', distance: 'Distance', duration: 'Duration', activities: 'Activities' };
  const rows = sl.map((m, i) => {
    const rank = (p - 1) * PS + i + 1;
    const rc = rank === 1 ? 'rk1' : rank === 2 ? 'rk2' : rank === 3 ? 'rk3' : 'rkn';
    const team = tb[m.team_id] || { name: 'No Team', color: '#555', emoji: '⚪' };
    const streak = m.currentStreak >= 2 ? `<span class="stk">${m.currentStreak}d</span>` : '';
    const init = m.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    let pri = '';
    switch (metric) {
      case 'points': pri = `<span class="pc">${m.totalPoints}</span>`; break;
      case 'calories': pri = `<span class="mc">${fmt(Math.round(m.totalCalories))} kcal</span>`; break;
      case 'distance': pri = `<span class="mc">${m.totalDistanceKm.toFixed(1)} km</span>`; break;
      case 'duration': pri = `<span class="mc">${fmtDur(m.totalDurationMin)}</span>`; break;
      case 'activities': pri = `<span class="mc">${m.activityCount}</span>`; break;
    }
    return `<tr class="lr">
      <td><span class="rk ${rc}">${rank}</span></td>
      <td><div class="mrow">
        <div class="av">${init}</div>
        <div><div class="mn">${m.name}${streak}</div><div class="mm"><span class="td" style="background:${team.color}"></span>${team.name}</div></div>
      </div></td>
      <td class="r">${pri}</td>
      <td class="r mc hm">${fmt(Math.round(m.totalCalories))}</td>
      <td class="r mc hm">${(m._fullDistKm ?? m.totalDistanceKm).toFixed(1)} km</td>
      <td class="r mc hm">${fmtDur(m.totalDurationMin)}</td>
      <td class="r mc hm">${m.activityCount}</td>
    </tr>`;
  }).join('');
  return `<div class="lw"><table><thead><tr>
    <th style="width:44px">#</th><th>Athlete</th><th class="r">${ML[metric] || metric}</th>
    <th class="r hm">Calories</th><th class="r hm">Distance</th><th class="r hm">Duration</th><th class="r hm">Acts</th>
  </tr></thead><tbody>${rows}</tbody></table>${pages > 1 ? pgr(p, pages, tot, pgKey) : ''}</div>`;
}

function pgr(p, pages, tot, key) {
  const s = (p - 1) * PS + 1, e = Math.min(p * PS, tot);
  let b = `<button class="pbn" ${p <= 1 ? 'disabled' : ''} data-pg="${key}:${p - 1}">←</button>`;
  for (let i = 1; i <= pages; i++) {
    if (pages > 7 && i > 2 && i < pages - 1 && Math.abs(i - p) > 1) { if (i === 3 || i === pages - 2) b += `<span style="color:var(--dim);padding:0 2px;font-family:var(--mono)">…</span>`; continue; }
    b += `<button class="pbn ${i === p ? 'on' : ''}" data-pg="${key}:${i}">${i}</button>`;
  }
  b += `<button class="pbn" ${p >= pages ? 'disabled' : ''} data-pg="${key}:${p + 1}">→</button>`;
  return `<div class="pgr"><span class="pi">${s}–${e} of ${tot}</span><div class="pb">${b}</div></div>`;
}

function gp(key, p) {
  PG[key] = p;
  if (key === 'overall') rOLB(); if (key === 'individual') rInd(); if (key === 'acts') rActs();
  const pid = key === 'acts' ? 'activities' : key;
  document.getElementById('panel-' + pid)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function rChips() {
  const tb = {}; CONFIG.TEAMS.forEach(t => tb[t.id] = t); const el = document.getElementById('achips');
  if (!aSrch) { el.innerHTML = ''; return; }
  let f = [...LB]; if (aTm !== 'all') f = f.filter(m => m.team_id === aTm);

      <span>${m.name}</span></div>`;
  }).join('');
}
function selAth(id) { selA = id; aSrch = ''; document.getElementById('asrch').value = ''; PG.acts = 1; rChips(); rActs(); }

function rActs() {
  const tb = {}; CONFIG.TEAMS.forEach(t => tb[t.id] = t);
  let members = [...LB];
  if (aTm !== 'all') members = members.filter(m => m.team_id === aTm);
  if (selA) members = members.filter(m => m.id === selA);
  let all = [];
  members.forEach(m => {
    const team = tb[m.team_id] || { color: '#555', name: 'No Team', emoji: '⚪' };
    (m.activities || []).forEach(a => all.push({ ...a, member: m, team }));
  });
  if (afFrom || afTo) all = all.filter(a => inDR(a, afFrom, afTo));
  all.sort((a, b) => new Date(b.start_date) - new Date(a.start_date));
  if (!all.length) { document.getElementById('acontent').innerHTML = `<div class="empty">No activities found.</div>`; return; }
  const p = PG.acts, tot = all.length, pages = Math.ceil(tot / PS);
  const sl = all.slice((p - 1) * PS, p * PS); const showWho = !selA;
  const cards = sl.map(a => {
    const icon = SICO[a.sport_type] || '🏅';
    const dk = ((a.distance || 0) / 1000).toFixed(1), dm = Math.round((a.moving_time || 0) / 60), cal = Math.round(a.calories || 0);
    const _d = new Date(a.start_date); const date = _d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric', timeZone: TIMEZONE }) + ', ' + _d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', timeZone: TIMEZONE });
    const pts = a.points || 0, bd = a.breakdown || {};
    const bn = [];
    if (bd.base) bn.push(`+${bd.base} base`); if (bd.calories) bn.push(`+${bd.calories} cal`);
    if (bd.distance) bn.push(`+${bd.distance} dist`); if (bd.sportBonus) bn.push(`+${bd.sportBonus} sport`); if (bd.duration) bn.push(`+${bd.duration} dur`);
    if (bd.dailyTop) bn.push(`+${bd.dailyTop} top`); if (bd.streak) bn.push(`+${bd.streak} streak`);

function setupUpload() {
  const zone = document.getElementById('upload-zone');
  const input = document.getElementById('file-input');
  if (!zone || !input) return;

  // Remove previous click handler to avoid stale input references
  if (zone._clickHandler) zone.removeEventListener('click', zone._clickHandler);
  if (zone._dragOverHandler) zone.removeEventListener('dragover', zone._dragOverHandler);
  if (zone._dragLeaveHandler) zone.removeEventListener('dragleave', zone._dragLeaveHandler);
  if (zone._dropHandler) zone.removeEventListener('drop', zone._dropHandler);

  zone._clickHandler = (e) => {
    if (e.target.closest('button, img')) return;
    const fi = document.getElementById('file-input');
    if (fi) fi.click();
  };
  zone._dragOverHandler = (e) => { e.preventDefault(); zone.classList.add('drag'); };
  zone._dragLeaveHandler = () => zone.classList.remove('drag');
  zone._dropHandler = (e) => { e.preventDefault(); zone.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); };

  zone.addEventListener('click', zone._clickHandler);
  zone.addEventListener('dragover', zone._dragOverHandler);
  zone.addEventListener('dragleave', zone._dragLeaveHandler);
  zone.addEventListener('drop', zone._dropHandler);

  const changeHandler = () => { const f = document.getElementById('file-input'); if (f && f.files[0]) handleFile(f.files[0]); };
  input.addEventListener('change', changeHandler);
}

  if (!file) return;

async function computeDHash(dataUrl) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      try {
        const W = 17, H = 16; // 16x16 bits = 256-bit hash (was 8x8/64-bit, too coarse — collided on same-template screenshots)
        const canvas = document.createElement('canvas');
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');
        if (!ctx) { resolve(null); return; }
        const cropRatio = 0.08;
        const sx = img.width * cropRatio;
        const sy = img.height * cropRatio;
        const sw = img.width * (1 - 2 * cropRatio);
        const sh = img.height * (1 - 2 * cropRatio);
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, W, H);
        const imageData = ctx.getImageData(0, 0, W, H);
        const p = imageData.data;
        const gray = [];
        for (let y = 0; y < H; y++) {
          for (let x = 0; x < W; x++) {
            const i = (y * W + x) * 4;
            gray.push(Math.round(0.299 * p[i] + 0.587 * p[i + 1] + 0.114 * p[i + 2]));
          }
        }
        const totalBits = (W - 1) * H;
        let hash = 0n;
        let bitIdx = 0;
        for (let y = 0; y < H; y++) {
          for (let x = 0; x < W - 1; x++) {
            if (gray[y * W + x + 1] > gray[y * W + x]) {
              hash |= (1n << BigInt(totalBits - 1 - bitIdx));
            }
            bitIdx++;
          }
        }
        resolve(hash.toString(16).padStart(Math.ceil(totalBits / 4), '0'));
      } catch (e) { resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = dataUrl;
  });
}

async function confirmActivity() {
  const u = Session.get();
  if (!u) return toast('Please register first.', 'error');

  const name = document.getElementById('rf-name').value.trim();
  const sportType = document.getElementById('rf-sport').value;
  const calories = parseFloat(document.getElementById('rf-cal').value) || 0;
  const distanceKm = parseFloat(document.getElementById('rf-dist').value) || 0;
  const durationMin = parseFloat(document.getElementById('rf-dur').value) || 0;
  const elevationGain = parseFloat(document.getElementById('rf-elev').value) || 0;
  const date = document.getElementById('rf-date').value;
  if (!date) return toast('Date is required.', 'error');

  const userCorrected = ['rf-name','rf-cal','rf-dist','rf-dur','rf-date','rf-sport','rf-elev'].some(id => document.getElementById(id).classList.contains('edited'));

  let imageHash = null, dhash = null;
  if (ocrImage) {
    try {
      const base64Data = ocrImage.includes(',') ? ocrImage.split(',')[1] : ocrImage;
      const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(base64Data));
      imageHash = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
      dhash = await computeDHash(ocrImage);
    } catch (e) { imageHash = null; dhash = null; }
  }

  const btn = document.getElementById('confirm-btn');
  btn.disabled = true; btn.textContent = 'Submitting...';
  try {
    await OCR.submitActivity({
      user_id: u.id,
      name: name || sportType,
      sport_type: sportType,
      distance: distanceKm * 1000,
      moving_time: Math.round(durationMin * 60),
      calories: Math.round(calories),
      start_date: date + ':00+07:00',
      image_path: ocrImage ? date : null,
      image_hash: imageHash,
      dhash: dhash,
      elevation_gain: elevationGain,
      companions: rfCompanions,
    });
    toast('Activity submitted!', 'success');
    resetUpload();
    document.getElementById('review-area').style.display = 'none';
    await loadData();
  } catch (e) {
    toast('Failed: ' + e.message, 'error');
  } finally { btn.disabled = false; btn.textContent = 'Confirm Activity'; }
}

function rScoring() {
  const S = CONFIG.SCORING;
  const capOf = tiers => Scoring.tieredBonus(Infinity, tiers);
  const durRawFull = S.DURATION_TIERS[0].upTo + S.DURATION_BASE;
  const durRawHalf = S.DURATION_TIERS[1].upTo + S.DURATION_BASE;
  const rules = [
    ['✅', 'Valid Activity', `Min ${S.MIN_DURATION} minutes, any sport. Calories must clear a per-sport minimum kcal/min (see Calorie Plausibility below). Walking/Hiking/Running also need a realistic pace & distance for the reported time.`, `+${S.BASE_ACTIVITY}`],
    ['💪', 'Sport Bonus', `Non-distance sports only (Gym, Yoga, Team & Racket Sports, Martial Arts, etc). Decays per same-day occurrence — 1st +${S.SPORT_BONUS}, 2nd +${Scoring.nonDistanceSportBonus(2)}, 3rd +${Scoring.nonDistanceSportBonus(3)}, 4th+ +0.`, `+${S.SPORT_BONUS} max`],
    ['🔥', 'Calorie Bonus', `Daily pool, all sports combined: full rate to ${S.CALORIE_TIERS[0].upTo}kcal, half rate to ${S.CALORIE_TIERS[1].upTo}kcal, flat after that.`, `+${capOf(S.CALORIE_TIERS)} max/day`],
    ['📏', 'Distance Bonus', `Daily pool per sport: full rate to 4× the sport's normal per-step distance, half rate to 8×, flat beyond (e.g. Run/Walk: full 0-10km, half 10-20km, flat 20km+/day).`, ''],
    ['⛰️', 'Elevation Bonus', 'Trail/Hike/Climb: +5/100m, Cycling: +5/200m, eBike: +3/300m.', ''],
    ['⏱️', 'Duration Bonus', `Daily pool, all sports combined: first ${S.DURATION_BASE}min free, full rate to ${durRawFull}min total, half rate to ${durRawHalf}min total, flat after that.`, `+${capOf(S.DURATION_TIERS)} max/day`],
    ['🏆', 'Daily Top Cal', `Highest calories burned across ALL athletes that day.`, `+${S.DAILY_TOP_CALORIES}`],
    ['🎯', 'Streak M1', '3 consecutive days. Once per challenge.', `+${S.STREAK_MILESTONES[0]}`],
    ['🎯', 'Streak M2', '6 consecutive days. Once per challenge.', `+${S.STREAK_MILESTONES[1]}`],
    ['🎯', 'Streak M3', '9 consecutive days. Once per challenge.', `+${S.STREAK_MILESTONES[2]}`],
    ['🎯', 'Streak M4+', '12+ days. Max streak bonus = 100 pts.', `+${S.STREAK_MILESTONES[3]}`],
    ['🏅', '30-Day Streak Bonus', `${S.STREAK_BONUS_30_DAYS} consecutive days. One-time, on top of the milestones above.`, `+${S.STREAK_BONUS_30_POINTS}`],
    ['🔥', 'Comeback Bonus', `First activity after ${S.REACTIVATION_GAP_DAYS}+ days inactive.`, `+${S.REACTIVATION_BONUS}`],
    ['🤝', 'Group Activity Bonus', `${S.GROUP_MIN_SIZE}+ people, same sport, within ${S.GROUP_TIME_WINDOW_MIN}min of each other, mutually tagged. Any zone.`, `+${S.GROUP_BONUS_PER_PERSON}/person`],
  ];
  document.getElementById('sgrid').innerHTML = rules.map(([i, t, d, p]) => `
    <div class="sr"><div class="si">${i}</div><div><div class="stt">${t}</div><div class="sd">${d}</div></div><div class="spts">${p}</div></div>`).join('');
  document.querySelector('#panel-scoring .sec-title').textContent = 'Calorie Plausibility Ceiling (from ' + CONFIG.RULE_CUTOVER_DATE + ')';
  rCalorieCeilings();
}

function rCalorieCeilings() {
  const S = CONFIG.SCORING;
  document.getElementById('cnote').innerHTML =
    `Kalori dicek kewajarannya per jenis olahraga pakai MET (Metabolic Equivalent) dari Compendium of Physical Activities: kal/menit &asymp; MET &times; 1.225 (referensi berat 70kg). ` +
    `Kalau kalori yang dilaporkan melebihi batas di bawah, yang dipakai untuk hitung bonus cuma sampai batas itu &mdash; aktivitasnya tetap valid, cuma bonus kalorinya yang disesuaikan. ` +
    `Berlaku untuk aktivitas mulai ${CONFIG.RULE_CUTOVER_DATE}; histori sebelumnya tidak terpengaruh.`;
  const rows = Object.entries(S.CAL_PER_MIN).filter(([sport]) => sport !== 'DEFAULT').sort((a, b) => a[0].localeCompare(b[0]));
  document.getElementById('cgrid').innerHTML = rows.map(([sport, range]) => {
    const icon = SICO[sport] || '🏅';
    return `<div class="sr"><div class="si">${icon}</div><div><div class="stt">${sport}</div><div class="sd">Min ${range.min} kcal/menit</div></div><div class="spts">${range.max}/menit</div></div>`;
  }).join('');
}

// ── UTILS ───────────────────────────────────────────────────────

function fmt(n) { return Number(n).toLocaleString('en-US'); }
function fmtDur(m) { const h = Math.floor(m / 60), mn = Math.round(m % 60); return h > 0 ? `${h}h ${mn}m` : `${mn}m`; }
let _tt;
function toast(msg, type = '') {
  const el = document.getElementById('toast'); el.textContent = msg; el.className = 'show ' + (type || '');
  clearTimeout(_tt); _tt = setTimeout(() => el.className = '', 3200);
}
</script>
